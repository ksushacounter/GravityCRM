spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dance_studio
    username: postgres
    password: ksusha
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true # Тот самый важный параметр для нашей магии!

# Настройки JDBI (на самом верхнем уровне, без отступов)
jdbi:
  sql-object:
    enabled: true
  transaction:
    default-isolation-level: READ_COMMITTED

# Интеграция с кассой (на самом верхнем уровне)
kassa:
  api:
    base-url: https://api.modulkassa.ru/v1
    token: ${KASSA_TOKEN:your_token}
    timeout: 5000

# Логирование (на самом верхнем уровне)
logging:
  level:
    org.jdbi: DEBUG
    org.springframework.jdbc: DEBUG
    com.crm.gravity: DEBUG